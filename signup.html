<!DOCTYPE html>
<html>
<head>
  <title>Campus Connect - Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .signup-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      width: 350px;
      text-align: center;
    }
    .signup-container h2 {
      color: #1e3a5f;
      margin-bottom: 25px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button.signup-btn {
      width: 100%;
      padding: 12px;
      background-color: #1e90ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
    }
    button.signup-btn:hover {
      background-color: #187bcd;
    }
    .social-signup {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }
    .social-signup a {
      display: inline-block;
      width: 45%;
      text-align: center;
      padding: 10px 0;
      border-radius: 6px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    .social-signup a.facebook {
      background-color: #4267B2;
    }
    .social-signup a.google {
      background-color: #DB4437;
    }
    .login-link {
      margin-top: 15px;
    }
    .login-link a {
      text-decoration: none;
      color: #1e90ff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Sign Up</h2>
    <input type="text" id="fullname" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button class="signup-btn" onclick="signup()">Sign Up</button>
    
    <div class="social-signup">
      <a href="https://www.facebook.com/login" target="_blank" class="facebook">Facebook</a>
      <a href="https://accounts.google.com/signup" target="_blank" class="google">Google</a>
    </div>
    
    <div class="login-link">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>

  <script>
    function signup() {
      // Optional: Add validation here
      // Redirect to login page after signup
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
